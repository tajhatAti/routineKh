<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>২য় সেমিস্টার স্মার্ট ড্যাশবোর্ড</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 md:p-8">

    <div class="fixed top-4 right-4 text-right glass p-3 px-5 z-50">
        <div id="live-time" class="text-xl font-bold text-cyan-400 font-mono tracking-tighter">00:00:00</div>
        <div id="live-date" class="text-[10px] md:text-xs text-gray-400 uppercase">লোডিং...</div>
    </div>

    <div class="max-w-2xl mx-auto mt-16">
        <header class="mb-8">
            <h1 id="view-title" class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">
                আজকের রুটিন
            </h1>
            <p id="view-subtitle" class="text-gray-400 text-sm mt-1 italic">সিস্টেম বর্তমান সময় অনুযায়ী আপডেট হচ্ছে</p>
        </header>

        <div id="routine-display" class="space-y-4">
            </div>

        <div class="mt-12">
            <h2 class="text-xl font-bold mb-4 flex items-center">
                <span class="mr-2">📝</span> এসাইনমেন্ট ও আপডেট
            </h2>
            <div class="glass p-5 border-l-4 border-cyan-500">
                <p class="text-sm text-gray-300">এখনো কোনো নতুন এসাইনমেন্ট যুক্ত করা হয়নি।</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
