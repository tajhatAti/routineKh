<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Agriculture Portal – 2nd Semester</title>
  <meta name="description" content="2nd Semester Smart Student Portal for Agriculture Students – Routine, Assignments & GPA Calculator" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+Bengali:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="min-h-screen overflow-x-hidden">

  <!-- Animated Background -->
  <div class="bg-stars"></div>
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Header -->
  <header class="glass-header sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="logo-icon">🌾</div>
        <div>
          <h1 class="font-orbitron text-cyan-400 text-sm font-bold tracking-widest">AGRI PORTAL</h1>
          <p class="text-xs text-slate-400 font-bengali">2nd Semester · Room 110</p>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <div id="live-clock" class="font-mono text-cyan-300 text-sm font-bold tracking-wider"></div>
        <div id="live-date" class="text-xs text-slate-400 font-bengali"></div>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="max-w-7xl mx-auto px-4 py-6 space-y-6">

    <!-- Status Banner -->
    <div id="status-banner" class="status-banner glass-card p-4 flex items-center gap-4">
      <div id="status-icon" class="text-3xl">📚</div>
      <div>
        <p id="status-title" class="font-orbitron text-base font-bold text-white"></p>
        <p id="status-subtitle" class="text-xs text-slate-400 font-bengali mt-1"></p>
      </div>
      <div class="ml-auto">
        <div id="next-class-pill" class="pill-cyan text-xs font-mono hidden"></div>
      </div>
    </div>

    <!-- View Switcher -->
    <div class="flex gap-2 flex-wrap">
      <button onclick="setView('today')" id="btn-today" class="view-btn active font-bengali">আজকের ক্লাস</button>
      <button onclick="setView('tomorrow')" id="btn-tomorrow" class="view-btn font-bengali">আগামীকাল</button>
      <button onclick="setView('weekly')" id="btn-weekly" class="view-btn font-bengali">সাপ্তাহিক রুটিন</button>
      <button onclick="setView('assignments')" id="btn-assignments" class="view-btn font-bengali">অ্যাসাইনমেন্ট</button>
      <button onclick="setView('gpa')" id="btn-gpa" class="view-btn font-bengali">GPA ক্যালকুলেটর</button>
    </div>

    <!-- TODAY VIEW -->
    <div id="view-today" class="view-section space-y-4">
      <div class="flex items-center gap-3 mb-2">
        <h2 class="font-orbitron text-lg text-white font-bold" id="today-heading">আজকের সূচি</h2>
        <div id="today-day-badge" class="pill-violet text-xs font-bengali"></div>
      </div>
      <div id="today-classes" class="space-y-3"></div>
      <div id="today-empty" class="glass-card p-8 text-center hidden">
        <div class="text-5xl mb-3">🌙</div>
        <p class="font-orbitron text-cyan-400 font-bold">No Classes Today</p>
        <p class="text-slate-400 text-sm font-bengali mt-1">আজ ছুটির দিন। বিশ্রাম নাও!</p>
      </div>
    </div>

    <!-- TOMORROW VIEW -->
    <div id="view-tomorrow" class="view-section space-y-4 hidden">
      <div class="flex items-center gap-3 mb-2">
        <h2 class="font-orbitron text-lg text-white font-bold">আগামীকালের সূচি</h2>
        <div id="tomorrow-day-badge" class="pill-violet text-xs font-bengali"></div>
      </div>
      <div id="tomorrow-classes" class="space-y-3"></div>
      <div id="tomorrow-empty" class="glass-card p-8 text-center hidden">
        <div class="text-5xl mb-3">🎉</div>
        <p class="font-orbitron text-cyan-400 font-bold">Weekend Tomorrow!</p>
        <p class="text-slate-400 text-sm font-bengali mt-1">আগামীকাল ছুটির দিন।</p>
      </div>
    </div>

    <!-- WEEKLY VIEW -->
    <div id="view-weekly" class="view-section hidden">
      <h2 class="font-orbitron text-lg text-white font-bold mb-4">সাপ্তাহিক রুটিন</h2>
      <div id="weekly-grid" class="space-y-4"></div>
    </div>

    <!-- ASSIGNMENTS VIEW -->
    <div id="view-assignments" class="view-section hidden space-y-4">
      <div class="flex items-center justify-between">
        <h2 class="font-orbitron text-lg text-white font-bold">অ্যাসাইনমেন্ট ট্র্যাকার</h2>
        <button onclick="openAddAssignment()" class="btn-add font-bengali">+ নতুন যোগ করুন</button>
      </div>
      <div id="assignment-list" class="space-y-3"></div>
      <div id="assignment-empty" class="glass-card p-8 text-center hidden">
        <div class="text-5xl mb-3">✅</div>
        <p class="font-orbitron text-cyan-400 font-bold">All Clear!</p>
        <p class="text-slate-400 text-sm font-bengali mt-1">কোনো অ্যাসাইনমেন্ট নেই।</p>
      </div>
    </div>

    <!-- GPA VIEW -->
    <div id="view-gpa" class="view-section hidden">
      <h2 class="font-orbitron text-lg text-white font-bold mb-4">GPA ক্যালকুলেটর</h2>
      <div class="glass-card p-6 space-y-4">
        <div id="gpa-rows" class="space-y-3">
          <div class="gpa-row flex gap-3">
            <input type="text" placeholder="বিষয়ের নাম" class="gpa-input flex-1 font-bengali" />
            <input type="number" placeholder="ক্রেডিট" min="1" max="4" class="gpa-input w-20 font-mono" />
            <select class="gpa-input w-24 font-mono">
              <option value="4.0">A+ (4.0)</option>
              <option value="3.75">A (3.75)</option>
              <option value="3.5">A- (3.5)</option>
              <option value="3.25">B+ (3.25)</option>
              <option value="3.0">B (3.0)</option>
              <option value="2.75">B- (2.75)</option>
              <option value="2.5">C+ (2.5)</option>
              <option value="2.25">C (2.25)</option>
              <option value="2.0">D (2.0)</option>
              <option value="0">F (0.0)</option>
            </select>
            <button onclick="this.closest('.gpa-row').remove(); calcGPA();" class="text-red-400 hover:text-red-300 text-lg px-2">×</button>
          </div>
        </div>
        <div class="flex gap-3 flex-wrap">
          <button onclick="addGpaRow()" class="btn-add font-bengali">+ বিষয় যোগ করুন</button>
          <button onclick="calcGPA()" class="btn-calc font-bengali">হিসাব করুন</button>
        </div>
        <div id="gpa-result" class="hidden glass-result p-4 text-center">
          <p class="text-slate-400 text-sm font-bengali">তোমার GPA</p>
          <p id="gpa-value" class="font-orbitron text-5xl font-black text-cyan-400 my-2"></p>
          <p id="gpa-grade" class="text-slate-300 font-bengali text-sm"></p>
        </div>
      </div>
    </div>

  </main>

  <!-- Add Assignment Modal -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()">
    <div class="modal-box glass-card p-6 space-y-4" onclick="event.stopPropagation()">
      <h3 class="font-orbitron text-white font-bold text-base">নতুন অ্যাসাইনমেন্ট</h3>
      <div class="space-y-3">
        <div>
          <label class="text-xs text-slate-400 font-bengali mb-1 block">বিষয়</label>
          <select id="asgn-subject" class="gpa-input w-full font-bengali">
            <option>পদার্থ বিজ্ঞান-২</option>
            <option>জীব বিজ্ঞান-২</option>
            <option>রসায়ন-২</option>
            <option>ভূমি আর্দ্রতা সংরক্ষণে উৎপাদন প্রযুক্তি-২</option>
            <option>হিসাববিজ্ঞান</option>
            <option>বাংলা-২</option>
            <option>কম্পিউটার অ্যাপ্লিকেশন</option>
            <option>ইংরেজি</option>
            <option>অন্যান্য</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-slate-400 font-bengali mb-1 block">অ্যাসাইনমেন্টের বিবরণ</label>
          <input id="asgn-title" type="text" placeholder="যেমন: Chapter 3 লিখে আনো" class="gpa-input w-full font-bengali" />
        </div>
        <div>
          <label class="text-xs text-slate-400 font-bengali mb-1 block">জমা দেওয়ার তারিখ</label>
          <input id="asgn-due" type="date" class="gpa-input w-full font-mono" />
        </div>
      </div>
      <div class="flex gap-3 justify-end">
        <button onclick="closeModal()" class="btn-cancel font-bengali">বাতিল</button>
        <button onclick="saveAssignment()" class="btn-calc font-bengali">সংরক্ষণ করুন</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
      </html>
