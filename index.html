<!doctype html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Agriculture Student Portal — Command Center</title>
  <meta name="description" content="Real-time command center for 2nd semester agriculture students: live class tracking, assignments, GPA tools, and weekly schedule." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Ambient background orbs -->
  <div class="orbs" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>

  <main class="container">
    <!-- HERO HEADER -->
    <header class="glass hero">
      <div class="hero-left">
        <p class="hero-eyebrow" id="dateLine">—</p>
        <h1 class="hero-title">
          <span class="aurora">Smart Agriculture</span><br />
          Student Portal
        </h1>
        <p class="hero-status" id="statusLine">লোড হচ্ছে…</p>
      </div>
      <div class="hero-right">
        <div class="clock" id="clock">--:--:--</div>
        <div class="clock-label">লাইভ ঘড়ি</div>
      </div>
    </header>

    <!-- MAIN GRID -->
    <section class="grid">
      <div class="col-main">
        <!-- PRIORITY PANEL -->
        <article class="glass priority" id="priorityCard">
          <div class="priority-head">
            <span class="badge" id="priorityBadge">Top Priority</span>
            <span class="badge subtle" id="priorityCountdown"></span>
          </div>
          <h2 class="priority-title" id="prioritySubject">—</h2>
          <p class="priority-meta" id="priorityMeta"></p>
          <div class="progress"><div class="progress-bar" id="priorityProgress"></div></div>
        </article>

        <!-- SCHEDULE SWITCHER -->
        <article class="glass">
          <div class="schedule-head">
            <h3>📅 ক্লাস রুটিন</h3>
            <div class="tabs" role="tablist">
              <button class="tab active" data-view="today">আজ</button>
              <button class="tab" data-view="tomorrow">আগামীকাল</button>
              <button class="tab" data-view="week">সপ্তাহ</button>
            </div>
          </div>
          <div id="scheduleBody" class="schedule-body"></div>
        </article>
      </div>

      <!-- ASIDE: ASSIGNMENTS -->
      <aside class="col-aside">
        <article class="glass">
          <div class="assign-head">
            <h3>📝 অ্যাসাইনমেন্ট</h3>
            <button class="btn-icon" id="addBtn" title="যোগ করুন">+</button>
          </div>
          <form id="addForm" class="add-form" hidden>
            <input id="aTitle" placeholder="শিরোনাম" required />
            <input id="aSubject" placeholder="বিষয়" required />
            <input id="aDue" type="date" required />
            <div class="form-row">
              <button type="submit" class="btn primary">যোগ করুন</button>
              <button type="button" class="btn ghost" id="cancelAdd">বাতিল</button>
            </div>
          </form>
          <ul id="assignList" class="assign-list"></ul>
        </article>
      </aside>
    </section>

    <footer class="foot">
      Smart Agriculture Student Portal · 2nd Semester · Built with ⚡
    </footer>
  </main>

  <!-- FLOATING GPA CALCULATOR -->
  <button class="fab" id="gpaToggle" title="GPA Calculator">🎓</button>
  <div class="gpa-modal" id="gpaModal" hidden>
    <div class="glass gpa-card">
      <div class="gpa-head">
        <h3>🎓 GPA ক্যালকুলেটর</h3>
        <button class="btn-icon" id="gpaClose">✕</button>
      </div>
      <div id="gpaRows" class="gpa-rows"></div>
      <div class="form-row">
        <button class="btn ghost" id="gpaAdd">+ কোর্স</button>
        <button class="btn primary" id="gpaCalc">হিসাব করুন</button>
      </div>
      <div class="gpa-result" id="gpaResult">GPA: —</div>
    </div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
